{% extends 'bookings/base.html' %}
{% block content %}
<style>
    .card-panel { background: #ffffff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); padding: 30px; }
    .panel-heading { color: #0b59a4; font-weight: 700; font-size: 1.35rem; margin-bottom: 25px; }
    .form-control-custom { border: 1px solid #e2e8f0; border-radius: 6px; padding: 12px; margin-bottom: 20px; }
    .form-label-custom { font-weight: 600; color: #122b46; margin-bottom: 8px; font-size: 0.9rem; }
</style>
<div class="container my-5">
    <div class="row g-4 justify-content-center">
        <div class="col-lg-5">
            <div class="card-panel">
                <div class="panel-heading">Our Service Catalog</div>
                <div class="accordion" id="servicesAccordion">
                    {% for cat in categories %}
                    <div class="accordion-item mb-2 border-0 shadow-sm">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#flush-{{ forloop.counter }}">
                                {{ cat.icon }} {{ cat.name }}
                            </button>
                        </h2>
                        <div id="flush-{{ forloop.counter }}" class="accordion-collapse collapse" data-bs-parent="#servicesAccordion">
                            <div class="accordion-body">
                                {% for item in cat.items %}<div class="py-1 small text-muted">✔ {{ item }}</div>{% endfor %}
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card-panel">
                <div class="panel-heading">Submit Work Enquiry</div>
                {% if messages %}{% for msg in messages %}<div class="alert alert-success">{{ msg }}</div>{% endfor %}{% endif %}
                <form action="{% url 'enquiry' %}" method="POST">
                    {% csrf_token %}
                    <input type="text" name="full_name" class="form-control form-control-custom" placeholder="Full Name" required>
                    <input type="tel" name="phone_number" class="form-control form-control-custom" placeholder="WhatsApp Number" required>
                    <select name="service_required" class="form-select form-control-custom" required>
                        <option value="" disabled selected>Select Service</option>
                        {% for service in all_services %}<option value="{{ service }}">{{ service }}</option>{% endfor %}
                    </select>
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label-custom">Preferred Date</label>
                            <input type="date" name="preferred_date" class="form-control form-control-custom" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">Preferred Slot</label>
                            <select name="preferred_slot" class="form-select form-control-custom" required>
                                <option value="morning">Morning</option>
                                <option value="afternoon">Afternoon</option>
                                <option value="evening">Evening</option>
                            </select>
                        </div>
                    </div>
                    <textarea name="address" class="form-control form-control-custom" rows="2" placeholder="Full Address" required></textarea>
                    <textarea name="work_description" class="form-control form-control-custom" rows="3" placeholder="Work Details" required></textarea>
                    <button type="submit" class="btn btn-action w-100">Submit Enquiry</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
