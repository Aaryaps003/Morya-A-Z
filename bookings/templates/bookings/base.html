{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morya Housekeeping A-Z Multiservices</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for clean icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #0b59a4;
            --brand-orange: #f37023;
            --brand-dark: #122b46;
        }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', system-ui, sans-serif; }
        .brand-navbar { background-color: #ffffff; border-bottom: 2px solid #eef2f5; padding: 10px 0; }
        .logo-img { height: 55px; object-fit: contain; }
        .nav-link-custom { color: var(--brand-dark) !important; font-weight: 500; margin-left: 20px; text-decoration: none; transition: color 0.2s; }
        .nav-link-custom:hover, .nav-link-custom.active { color: var(--brand-blue) !important; font-weight: 700; }
        .btn-brand { background-color: var(--brand-orange); color: white; border: none; font-weight: 600; padding: 10px 24px; border-radius: 6px; }
        .btn-brand:hover { background-color: #e05e12; color: white; }
        .footer-bg { background-color: var(--brand-dark); color: white; }
    </style>
</head>
<body>

    <!-- Top Header Navigation -->
    <header class="brand-navbar shadow-sm sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <img src="{% static 'bookings/logo.jpg' %}" alt="Morya Logo" class="logo-img me-3">
                <span class="h4 mb-0 fw-bold d-none d-md-inline" style="color: var(--brand-blue);">Morya Housekeeping A-Z Multiservices</span>
            </div>
            <nav class="d-flex align-items-center">
                <a href="{% url 'home' %}" class="nav-link-custom">Home</a>
                <a href="{% url 'enquiry' %}" class="btn btn-brand ms-3">Book Service</a>
            </nav>
        </div>
    </header>

    <!-- Content Block Placeholder (Unit 2 Template Inheritance) -->
    {% block content %}
    {% endblock %}

    <!-- Footer Segment -->
    <footer class="footer-bg py-4 mt-5 text-center">
        <div class="container">
            <p class="mb-1">© 2026 Morya Housekeeping A-Z Multiservices. All Rights Reserved.</p>
            <small class="text-white-50">स्वच्छता ♦ विश्वासार्ह ♦ समाधान</small>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
