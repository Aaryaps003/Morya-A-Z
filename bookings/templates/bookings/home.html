{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morya Housekeeping & Multi Services</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #0b59a4;
            --brand-orange: #f37023;
            --brand-dark: #122b46;
        }
        
        body {
            background-color: #f8f9fa;
        }

        /* Top Header Navbar Style matching your image */
        .brand-navbar {
            background-color: #ffffff;
            border-bottom: 2px solid #eef2f5;
            padding: 10px 0;
        }
        
        .logo-img {
            height: 55px; /* Adjust scale to fit cleanly */
            object-fit: contain;
        }

        .nav-link-custom {
            color: var(--brand-dark) !important;
            font-weight: 500;
            margin-left: 20px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-link-custom:hover, .nav-link-custom.active {
            color: var(--brand-blue) !important;
            font-weight: 700;
        }

        /* Dashboard & Form Containers */
        .dashboard-title {
            color: var(--brand-dark);
            font-weight: bold;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .card-panel {
            background: #ffffff;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            padding: 30px;
            height: 100%;
        }

        .panel-heading {
            color: var(--brand-blue);
            font-weight: 700;
            font-size: 1.35rem;
            margin-bottom: 25px;
        }

        .form-control-custom {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
            color: #334155;
        }
        .form-control-custom::placeholder {
            color: #94a3b8;
        }
        .form-control-custom:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 3px rgba(11, 89, 164, 0.15);
        }

        .btn-action {
            background-color: var(--brand-blue);
            color: white;
            font-weight: 600;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            transition: background-color 0.2s;
        }
        .btn-action:hover {
            background-color: #08437c;
            color: white;
        }
    </style>
</head>
<body>

    <header class="brand-navbar shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <img src="{% static 'bookings/logo.jpg' %}" alt="Morya Logo" class="logo-img me-3">
                <span class="h4 mb-0 fw-bold d-none d-md-inline" style="color: var(--brand-blue);">Morya Services</span>
            </div>
            <nav class="d-flex align-items-center">
                <a href="#" class="nav-link-custom active">Home</a>
                <a href="#" class="nav-link-custom">Services</a>
                <a href="#" class="nav-link-custom fw-bold" style="color: var(--brand-orange) !important;">Admin</a>
            </nav>
        </div>
    </header>

    <main class="container mb-5">
        <h1 class="text-center dashboard-title">Customer Inquiry Desk</h1>

        <div class="row g-4 justify-content-center">
            
            <div class="col-lg-5">
                <div class="card-panel">
                    <div class="panel-heading">Our Service Catalog</div>
                    
                    <div class="list-group list-group-flush">
                        {% for service in services %}
                        <div class="py-3 border-bottom">
                            <div class="d-flex align-items-center mb-1">
                                <span class="fs-4 me-2">{{ service.icon }}</span>
                                <h5 class="fw-bold mb-0 text-dark">{{ service.title }}</h5>
                            </div>
                            <p class="text-muted small mb-0">{{ service.description }}</p>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card-panel">
                    <div class="panel-heading">Submit Work Enquiry</div>
                    
                    <form action="#" method="POST">
                        {% csrf_token %}
                        <input type="text" class="form-control form-control-custom" placeholder="Full Name" required>
                        <input type="tel" class="form-control form-control-custom" placeholder="WhatsApp / Phone Number" required>
                        
                        <select class="form-select form-control-custom" required>
                            <option value="" disabled selected>Select Service Required</option>
                            {% for service in services %}
                            <option value="{{ service.title }}">{{ service.title }}</option>
                            {% endfor %}
                        </select>
                        
                        <textarea class="form-control form-control-custom" rows="3" placeholder="Describe the work details (e.g., Space size, 2 BHK flat, deep clean requirement)" required></textarea>
                        
                        <button type="button" class="btn btn-action">Submit Enquiry</button>
                    </form>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
